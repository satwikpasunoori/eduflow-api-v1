version: "3.9"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./data:/app/instance
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=dev-secret-key-change-in-prod
      - JWT_SECRET_KEY=dev-jwt-secret-change-in-prod
      - DATABASE_URL=sqlite:////app/instance/eduflow.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    command: python wsgi.py
